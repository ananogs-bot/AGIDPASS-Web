<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro | AGID PASS</title>
  <link rel="stylesheet" href="css/auth.css">
</head>

<body class="login-page">

  <main class="login-wrapper">
    <section class="login-card">

      <img src="assets/logo.ico" alt="Logo AGID PASS" class="login-icon">

      <h1>Crie sua conta!</h1>
      <p>Cadastre-se para começar</p>

      <!-- <div class="login-tabs">
        <a href="login.html">Login</a>
        <button type="button" class="active">Cadastro</button>
      </div> -->

      <form id="formCadastro" class="login-form">

        <label for="tipoConta">Tipo de Conta</label>
        <select id="tipoConta" required>
          <option value="">Selecione</option>
          <option value="cliente">Cliente</option>
          <option value="profissional">Profissional</option>
        </select>

        <label for="nome">Nome completo</label>
        <input type="text" id="nome" placeholder="Digite seu nome" required>

        <label for="email">Endereço de E-mail</label>
        <input type="email" id="email" placeholder="nome@exemplo.com" required>

        <label for="cpf">CPF</label>
        <input type="text" id="cpf" placeholder="12345678910" required>

        <label for="cep">CEP</label>
        <input type="text" id="cep" placeholder="18000000" required>

        <label for="senha">Senha</label>
        <input type="password" id="senha" placeholder="Insira sua senha" required>

        <label for="confirmarSenha">Confirmar senha</label>
        <input type="password" id="confirmarSenha" placeholder="Confirme sua senha" required>

        <div id="camposProfissional" class="campos-profissional">
          <label for="descricao">Descrição profissional</label>
          <textarea id="descricao" placeholder="Descreva seus serviços"></textarea>

          <label>Especialidades</label>

          <div class="checkbox-group">
            <label><input type="checkbox" class="especialidade" value="manicure"> Manicure</label>
            <label><input type="checkbox" class="especialidade" value="pedicure"> Pedicure</label>
            <label><input type="checkbox" class="especialidade" value="barbearia"> Barbearia</label>
            <label><input type="checkbox" class="especialidade" value="cabeleireiro"> Cabeleireiro</label>
            <label><input type="checkbox" class="especialidade" value="design_sobrancelha"> Design de Sobrancelha</label>
            <label><input type="checkbox" class="especialidade" value="extensao_cilios"> Extensão de Cílios</label>
          </div>
        </div>

        <button type="submit" class="login-button">Cadastrar-se</button>

      </form>

      <a href="index.html" class="back-home">Voltar para a página inicial</a>

    </section>
  </main>

  <script type="module" src="js/cadastro.js"></script>
</body>
</html>
