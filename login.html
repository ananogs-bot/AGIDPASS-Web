<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | AGID PASS</title>

  <link rel="stylesheet" href="css/style.css">
</head>

<body class="login-page">

  <main class="login-wrapper">
    <section class="login-card">

      <img src="assets/logo.ico" alt="Logo AGID PASS" class="login-icon">

      <h1>Bom te ver novamente!</h1>
      <p>Faça login para prosseguir</p>

      <div class="login-tabs">
        <button type="button" class="active">Login</button>
        <a href="cadastro.html">Cadastro</a>
      </div>

      <form id="formLogin" class="login-form">
        <label for="email">Endereço de E-mail</label>
        <input type="email" id="email" placeholder="nome@exemplo.com" required>

        <label for="senha">Senha</label>
        <input type="password" id="senha" placeholder="Insira sua senha" required>

        <div class="login-options">
          <label class="remember">
            <input type="checkbox">
            Lembre de mim
          </label>

          <a href="#">Esqueceu a senha?</a>
        </div>

        <button type="submit" class="login-button">Login</button>
      </form>

      <a href="index.html" class="back-home">Voltar para a página inicial</a>

    </section>
  </main>

  <script type="module" src="js/login.js"></script>
</body>
</html>
